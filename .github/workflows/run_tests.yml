name: Run tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  CheckCoverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}

    - name: Install Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --locked --all-extras --dev

    - name: Run tests with coverage
      run: |
        uv run coverage run --rcfile=test/coverage/.coveragerc
        uv run coverage xml
        uv run coverage report

    - name: Generate HTML coverage report
      if: matrix.python-version == '3.12'
      run: uv run coverage html -d htmlcov

    - name: Generate coverage badge
      if: matrix.python-version == '3.12'
      run: uv run genbadge coverage -i coverage.xml -o coverage-badge.svg

    - name: Upload coverage report
      if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: coverage-report
        path: htmlcov

    - name: Upload coverage badge
      if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: coverage-badge
        path: coverage-badge.svg
